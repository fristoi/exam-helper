<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            width: 300px;
            text-align: center;
        }
        h2 { color: #0b3b5c; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #e2e8f0;
            border-radius: 30px;
        }
        button {
            background: #28a745;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
        }
        .error { color: #dc3545; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔐 Вход</h2>
        <input type="text" id="passwordInput" placeholder="Пароль">
        <button onclick="login()">Войти</button>
        <div id="error" class="error"></div>
    </div>

    <script>
        function login() {
            let pass = document.getElementById('passwordInput').value.trim();
            if (pass) window.location.href = 'index.html?p=' + encodeURIComponent(pass);
        }
        
        let params = new URLSearchParams(window.location.search);
        if (params.get('expired')) document.getElementById('error').textContent = '⏰ Срок истек';
        else if (params.get('error')) document.getElementById('error').textContent = '❌ Неверный пароль';
    </script>
</body>
</html>
