<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>📚 Помощник экзаменов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            background: #f1f5f9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 16px;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
        }
        
        /* Шапка */
        .top-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .title {
            font-size: 22px;
            font-weight: 600;
            color: #0b3b5c;
            white-space: nowrap;
        }
        .base-select {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 30px;
            font-size: 15px;
            background: white;
            cursor: pointer;
            outline: none;
        }
        .base-select:hover {
            border-color: #28a745;
        }
        .top-buttons {
            display: flex;
            gap: 6px;
        }
        .icon-btn {
            background: #e2e8f0;
            border: none;
            border-radius: 30px;
            width: 40px;
            height: 40px;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .icon-btn:hover {
            background: #cbd5e1;
        }
        
        /* Фильтр разделов */
        .filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .source-filter {
            padding: 6px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 30px;
            font-size: 13px;
            background: white;
            cursor: pointer;
            max-width: 180px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .source-filter:hover {
            background: #e2e8f0;
        }
        .source-filter.active {
            background: #28a745;
            color: white;
            border-color: #28a745;
        }
        
        /* Выпадающий список для разделов (когда их много) */
        .section-dropdown {
            margin-bottom: 20px;
            width: 100%;
        }
        .section-select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 30px;
            font-size: 14px;
            background: white;
            cursor: pointer;
        }
        
        .search-box {
            margin-bottom: 20px;
        }
        .search-box input {
            width: 100%;
            padding: 12px 18px;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            font-size: 15px;
            transition: all 0.2s;
            background: white;
        }
        .search-box input:focus {
            outline: none;
            border-color: #28a745;
            box-shadow: 0 0 0 3px rgba(40,167,69,0.1);
        }
        
        /* Список вопросов */
        .questions-list {
            background: white;
            border-radius: 24px;
            padding: 20px;
            border: 1px solid #e9edf2;
            max-height: 500px;
            overflow-y: auto;
        }
        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            color: #64748b;
            font-size: 14px;
        }
        .count-badge {
            background: #e2e8f0;
            padding: 4px 12px;
            border-radius: 30px;
            font-weight: 600;
        }
        
        .question-item {
            border-bottom: 1px solid #e9edf2;
            padding: 16px 0;
        }
        .question-item:last-child {
            border-bottom: none;
        }
        .punkt {
            color: #2563eb;
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 6px;
        }
        .source {
            color: #6c757d;
            font-size: 12px;
            margin-left: 8px;
            font-style: italic;
        }
        .question {
            font-weight: 600;
            margin-bottom: 12px;
            line-height: 1.5;
        }
        .answers {
            margin-left: 16px;
        }
        .answer-correct {
            color: #28a745;
            margin-bottom: 4px;
        }
        .answer-wrong {
            color: #dc3545;
            margin-bottom: 4px;
        }
        .no-results {
            text-align: center;
            color: #94a3b8;
            padding: 40px 20px;
        }
        
        /* Панель настроек */
        .settings-panel {
            background: #f8fafc;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .settings-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #1e293b;
        }
        .action-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        .action-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
        }
        .action-btn.import {
            background: #fd7e14;
            color: white;
        }
        .action-btn.export {
            background: #17a2b8;
            color: white;
        }
        .action-btn.clear {
            background: #dc3545;
            color: white;
        }
        .action-btn.rename {
            background: #6c757d;
            color: white;
        }
        .action-btn.delete {
            background: #dc3545;
            color: white;
        }
        .double-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        
        .add-form input, .add-form textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 14px;
        }
        .add-form textarea {
            min-height: 80px;
            resize: vertical;
        }
        .add-btn {
            width: 100%;
            padding: 12px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Верхняя панель -->
        <div class="top-bar">
            <span class="title">📚 Помощник экз.</span>
            <select class="base-select" id="baseSelect"></select>
            <div class="top-buttons">
                <button class="icon-btn" id="toggleSettingsBtn" title="Настройки">⚙️</button>
            </div>
        </div>

        <!-- Панель настроек (скрыта по умолчанию) -->
        <div class="settings-panel hidden" id="settingsPanel">
            <div class="settings-title">⚙️ Управление базой</div>
            <div class="double-row">
                <button class="action-btn rename" id="renameBaseBtn">✏️ Переименовать</button>
                <button class="action-btn delete" id="deleteBaseBtn">🗑️ Удалить базу</button>
            </div>
            <div class="action-row">
                <button class="action-btn import" id="importBtn">📥 Импорт JSON</button>
                <button class="action-btn export" id="exportBtn">📤 Экспорт JSON</button>
            </div>
            <button class="action-btn clear" id="clearBaseBtn">🗑️ Очистить базу</button>
            
            <div class="settings-title" style="margin-top:20px;">➕ Добавить вопрос</div>
            <div class="add-form">
                <input type="text" id="newPunkt" placeholder="Пункт (например, 1.1)">
                <input type="text" id="newSource" placeholder="Источник (необязательно)">
                <textarea id="newQuestion" placeholder="Вопрос" rows="2"></textarea>
                <textarea id="newAnswer" placeholder="Ответ" rows="2"></textarea>
                <button class="add-btn" id="addBtn">➕ Добавить</button>
            </div>
        </div>

        <!-- Фильтр разделов -->
        <div class="filter-bar" id="filterBar"></div>

        <!-- Выпадающий список для разделов (когда их много) -->
        <div class="section-dropdown hidden" id="sectionDropdown">
            <select class="section-select" id="sectionSelect">
                <option value="all">📋 Все разделы</option>
            </select>
        </div>

        <!-- Поиск -->
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 Поиск по пункту, вопросу или источнику...">
        </div>

        <!-- Список вопросов -->
        <div class="questions-list">
            <div class="list-header">
                <span>Вопросы</span>
                <span class="count-badge" id="questionCount">0</span>
            </div>
            <div id="questionsContainer"></div>
        </div>
    </div>

    <!-- Модальные окна -->
    <div class="modal-overlay" id="createBaseModal" style="display: none; position: fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; z-index:1000;">
        <div style="background:white; border-radius:24px; padding:24px; width:400px;">
            <h3 style="margin-bottom:16px;">➕ Создать новую базу</h3>
            <input type="text" id="newBaseName" placeholder="Название базы" style="width:100%; padding:12px; margin-bottom:16px; border:1px solid #e2e8f0; border-radius:8px;">
            <div class="double-row">
                <button class="add-btn" id="confirmCreateBtn">Создать</button>
                <button class="action-btn clear" id="closeCreateModal">Отмена</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="renameBaseModal" style="display: none; position: fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; z-index:1000;">
        <div style="background:white; border-radius:24px; padding:24px; width:400px;">
            <h3 style="margin-bottom:16px;">✏️ Переименовать базу</h3>
            <input type="text" id="renameBaseInput" placeholder="Новое название" style="width:100%; padding:12px; margin-bottom:16px; border:1px solid #e2e8f0; border-radius:8px;">
            <div class="double-row">
                <button class="add-btn" id="confirmRenameBtn">Переименовать</button>
                <button class="action-btn clear" id="closeRenameModal">Отмена</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
