<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>📚 Помощник экзаменов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            background: #f1f5f9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 16px;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
        }
        
        /* Шапка */
        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 20px;
        }
        .title {
            font-size: 24px;
            font-weight: 600;
            color: #0b3b5c;
        }
        .base-selector {
            display: flex;
            gap: 8px;
            flex: 1;
            min-width: 200px;
        }
        .base-select {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            font-size: 15px;
            background: white;
            cursor: pointer;
            outline: none;
        }
        .base-select:hover {
            border-color: #28a745;
        }
        
        /* Панель инструментов */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .tool-btn {
            background: #e2e8f0;
            border: none;
            border-radius: 40px;
            padding: 10px 18px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .tool-btn:hover {
            background: #cbd5e1;
        }
        .tool-btn.primary {
            background: #28a745;
            color: white;
        }
        .tool-btn.primary:hover {
            background: #218838;
        }
        .tool-btn.import { background: #fd7e14; color: white; }
        .tool-btn.export { background: #17a2b8; color: white; }
        .tool-btn.clear { background: #dc3545; color: white; }
        
        /* Поиск */
        .search-section {
            margin-bottom: 20px;
        }
        .search-box {
            display: flex;
            gap: 8px;
        }
        .search-input {
            flex: 1;
            padding: 14px 18px;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            font-size: 16px;
            transition: all 0.2s;
        }
        .search-input:focus {
            outline: none;
            border-color: #28a745;
            box-shadow: 0 0 0 3px rgba(40,167,69,0.1);
        }
        .clear-search {
            background: #e2e8f0;
            border: none;
            border-radius: 40px;
            width: 48px;
            font-size: 20px;
            cursor: pointer;
        }
        
        /* Результат */
        .result-area {
            background: #ffffff;
            border: 1px solid #e9edf2;
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 20px;
            min-height: 200px;
        }
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            color: #64748b;
            font-size: 14px;
        }
        .result-stats {
            background: #e2e8f0;
            padding: 4px 12px;
            border-radius: 30px;
            font-weight: 600;
        }
        
        .result-item {
            border-bottom: 1px solid #e9edf2;
            padding: 16px 0;
        }
        .result-item:last-child {
            border-bottom: none;
        }
        .result-punkt {
            color: #2563eb;
            font-weight: 700;
            font-size: 15px;
            margin-bottom: 6px;
        }
        .result-question {
            font-weight: 600;
            margin-bottom: 12px;
            line-height: 1.5;
        }
        .result-answers {
            margin-left: 16px;
        }
        .answer-correct {
            color: #28a745;
            margin-bottom: 4px;
        }
        .answer-wrong {
            color: #dc3545;
            margin-bottom: 4px;
        }
        .no-results {
            text-align: center;
            color: #94a3b8;
            padding: 40px 20px;
        }
        
        /* Управление базами */
        .bases-list {
            background: #f8fafc;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
        }
        .bases-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-weight: 600;
        }
        .base-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: white;
            border-radius: 40px;
            margin-bottom: 8px;
        }
        .base-name {
            font-weight: 500;
        }
        .base-count {
            background: #e2e8f0;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
        }
        .delete-base {
            background: none;
            border: none;
            color: #dc3545;
            font-size: 18px;
            cursor: pointer;
            margin-left: 8px;
        }
        
        /* Модальное окно */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 24px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal-header h3 {
            color: #1e293b;
        }
        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #64748b;
        }
        
        .add-form input, .add-form textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 15px;
        }
        .add-form textarea {
            min-height: 80px;
            resize: vertical;
        }
        .add-btn {
            width: 100%;
            padding: 14px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .action-row {
            display: flex;
            gap: 8px;
            margin: 16px 0;
        }
        
        @media (max-width: 600px) {
            .header {
                flex-direction: column;
                align-items: stretch;
            }
            .title {
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Шапка -->
        <div class="header">
            <div class="title">📚 Помощник экзаменов</div>
            <div class="base-selector">
                <select class="base-select" id="baseSelect"></select>
            </div>
        </div>
        
        <!-- Панель инструментов -->
        <div class="toolbar">
            <button class="tool-btn" id="newBaseBtn">➕ Создать базу</button>
            <button class="tool-btn import" id="importBtn">📥 Импорт JSON</button>
            <button class="tool-btn export" id="exportBtn">📤 Экспорт JSON</button>
            <button class="tool-btn clear" id="clearBaseBtn">🗑️ Очистить</button>
            <button class="tool-btn" id="addQuestionBtn">✏️ Добавить вопрос</button>
        </div>
        
        <!-- Поиск -->
        <div class="search-section">
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" placeholder="🔍 Введите пункт (например 1.1) или текст вопроса...">
                <button class="clear-search" id="clearSearchBtn">✖</button>
            </div>
        </div>
        
        <!-- Результат поиска -->
        <div class="result-area" id="resultArea">
            <div class="result-header">
                <span>Результаты поиска</span>
                <span class="result-stats" id="resultCount">0</span>
            </div>
            <div id="resultsList"></div>
        </div>
        
        <!-- Список баз (скрыт по умолчанию) -->
        <div class="bases-list" id="basesList" style="display: none;">
            <div class="bases-header">
                <span>📁 Мои базы</span>
                <span class="result-stats" id="totalBasesCount">0</span>
            </div>
            <div id="basesContainer"></div>
        </div>
    </div>
    
    <!-- Модальное окно создания базы -->
    <div class="modal-overlay" id="createBaseModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>➕ Создать новую базу</h3>
                <button class="close-btn" id="closeCreateModal">×</button>
            </div>
            <input type="text" id="newBaseName" placeholder="Название базы (например, ПТБ_2024)" style="width:100%; padding:12px; margin-bottom:16px;">
            <div class="action-row">
                <button class="add-btn" id="confirmCreateBtn">Создать</button>
            </div>
        </div>
    </div>
    
    <!-- Модальное окно добавления вопроса -->
    <div class="modal-overlay" id="addQuestionModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>➕ Добавить вопрос</h3>
                <button class="close-btn" id="closeAddModal">×</button>
            </div>
            <div class="add-form">
                <input type="text" id="newPunkt" placeholder="Пункт (например, 1.1)">
                <textarea id="newQuestion" placeholder="Вопрос" rows="3"></textarea>
                <textarea id="newAnswer" placeholder="Ответ (можно с ++)" rows="3"></textarea>
                <button class="add-btn" id="addBtn">➕ Добавить</button>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
