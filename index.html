<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 Помощник экзаменов</title>
    <!-- твои стили -->
</head>
<body>
    <!-- СКРИПТ ПРОВЕРКИ ПАРОЛЯ (вставь в самое начало после <body>) -->
    <script>
        const BIN_ID = '65f1a2b3c4d5e6f7g8h9i0j1';  // ← твой Bin ID
        const X_MASTER_KEY = '$2b$10$...';  // ← твой Master Key

        (async function() {
            // Получаем пароль из URL
            let urlParams = new URLSearchParams(window.location.search);
            let password = urlParams.get('p') || sessionStorage.getItem('current_password');
            
            if (!password) {
                window.location.href = 'login.html';
                return;
            }

            try {
                // Загружаем данные из JSONBin
                const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    headers: { 'X-Master-Key': X_MASTER_KEY }
                });
                const data = await response.json();
                let passwords = data.record.passwords || {};
                let passData = passwords[password];
                
                if (!passData) {
                    window.location.href = 'login.html?error=1';
                    return;
                }

                let now = Date.now();

                // Если первый вход
                if (!passData.activated) {
                    passData.activated = now;
                    passData.expires = now + passData.duration * 60 * 1000;
                    passData.visits = 1;
                    
                    // Сохраняем обновленные данные
                    passwords[password] = passData;
                    await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-Master-Key': X_MASTER_KEY
                        },
                        body: JSON.stringify({ passwords: passwords })
                    });
                    
                    sessionStorage.setItem('current_password', password);
                } 
                else {
                    if (now > passData.expires) {
                        window.location.href = 'login.html?expired=1';
                        return;
                    }
                    
                    passData.visits = (passData.visits || 0) + 1;
                    passwords[password] = passData;
                    
                    await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-Master-Key': X_MASTER_KEY
                        },
                        body: JSON.stringify({ passwords: passwords })
                    });
                    
                    sessionStorage.setItem('current_password', password);
                }

                // Запускаем таймер
                startTimer(passData.expires);

            } catch (e) {
                console.error('Ошибка:', e);
                window.location.href = 'login.html?error=1';
            }
        })();

        function startTimer(expires) {
            let timerDiv = document.createElement('div');
            timerDiv.id = 'accessTimer';
            timerDiv.style.cssText = `
                position: fixed;
                top: 70px;
                right: 20px;
                background: #28a745;
                color: white;
                padding: 8px 16px;
                border-radius: 30px;
                font-size: 14px;
                font-weight: bold;
                z-index: 9999;
            `;
            document.body.appendChild(timerDiv);

            let warningShown = false;

            setInterval(() => {
                let left = expires - Date.now();
                
                if (left <= 0) {
                    timerDiv.textContent = '⛔ Доступ истек';
                    timerDiv.style.background = '#dc3545';
                    document.querySelectorAll('button, input, select').forEach(el => el.disabled = true);
                    alert('⏰ Время доступа истекло');
                    setTimeout(() => {
                        sessionStorage.removeItem('current_password');
                        window.location.href = 'login.html?expired=1';
                    }, 2000);
                } else {
                    let mins = Math.floor(left / 60000);
                    let secs = Math.floor((left % 60000) / 1000);
                    timerDiv.textContent = `⏳ ${mins}:${secs.toString().padStart(2, '0')}`;
                    
                    if (left < 300000 && !warningShown) {
                        warningShown = true;
                        timerDiv.style.background = '#fd7e14';
                        alert('⚠️ Доступ истечет через 5 минут');
                    }
                    if (left < 60000) timerDiv.style.background = '#dc3545';
                }
            }, 1000);
        }
    </script>

    <!-- Твой основной контент -->
    <div class="top-bar">...</div>
    <div class="main-content">...</div>
    <script src="app.js"></script>
</body>
</html>
