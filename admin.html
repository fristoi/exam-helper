<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Управление паролями</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f8fafc;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h2 { color: #0b3b5c; }
        input, select, button {
            padding: 10px;
            margin: 5px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
        }
        button {
            background: #28a745;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover { background: #218838; }
        .password-item {
            padding: 10px;
            margin: 5px 0;
            background: #f8fafc;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .error { color: #dc3545; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔐 Управление паролями (JSONBin)</h2>
        
        <!-- Вход -->
        <div id="loginDiv">
            <h3>Вход</h3>
            <input type="password" id="masterPass" placeholder="Мастер-пароль">
            <button onclick="checkMasterPass()">Войти</button>
        </div>
        
        <!-- Админка (скрыта) -->
        <div id="adminDiv" style="display: none;">
            <h3>Создать пароль</h3>
            <input type="text" id="newPass" placeholder="Пароль (например: иван123)">
            <select id="duration">
                <option value="20">20 минут</option>
                <option value="40">40 минут</option>
                <option value="60">1 час</option>
            </select>
            <button onclick="createPassword()">Создать</button>
            
            <h3>Активные пароли</h3>
            <div id="passwordList"></div>
        </div>
    </div>

    <script>
        // ===== НАСТРОЙКИ =====
        const MASTER_PASSWORD = 'fr1312';  // ← СМЕНИ НА СВОЙ!
        const BIN_ID = '69b2e55aaa77b81da9dc21f3';  // ← ВСТАВЬ СВОЙ BIN ID
        const X_MASTER_KEY = '$2a$10$3SWLdSgMIVmgNS/KQBwLvezp5j7gw.8y/bYsSJbmQckm2kH06unYi';  // ← ВСТАВЬ СВОЙ MASTER KEY

        // Функция для работы с JSONBin
        async function getPasswords() {
            const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                headers: {
                    'X-Master-Key': X_MASTER_KEY
                }
            });
            const data = await response.json();
            return data.record.passwords || {};
        }

        async function savePasswords(passwords) {
            await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Master-Key': X_MASTER_KEY
                },
                body: JSON.stringify({ passwords: passwords })
            });
        }

        // Проверка мастер-пароля
        function checkMasterPass() {
            if (document.getElementById('masterPass').value === MASTER_PASSWORD) {
                document.getElementById('loginDiv').style.display = 'none';
                document.getElementById('adminDiv').style.display = 'block';
                loadPasswords();
            } else {
                alert('❌ Неверный пароль');
            }
        }

        // Создание нового пароля
        async function createPassword() {
            let password = document.getElementById('newPass').value.trim();
            let duration = parseInt(document.getElementById('duration').value);
            
            if (!password) {
                alert('Введите пароль');
                return;
            }

            let passwords = await getPasswords();
            
            if (passwords[password]) {
                alert('Такой пароль уже есть');
                return;
            }

            passwords[password] = {
                created: Date.now(),
                duration: duration,
                activated: null,
                expires: null,
                visits: 0
            };

            await savePasswords(passwords);
            
            document.getElementById('newPass').value = '';
            loadPasswords();
            
            let link = window.location.href.replace('admin-jsonbin.html', 'index.html') + '?p=' + password;
            navigator.clipboard.writeText(link);
            alert(`✅ Пароль "${password}" создан! Ссылка скопирована`);
        }

        // Загрузка списка паролей
        async function loadPasswords() {
            let passwords = await getPasswords();
            let listDiv = document.getElementById('passwordList');
            let now = Date.now();
            
            listDiv.innerHTML = '';
            
            for (let [pass, data] of Object.entries(passwords)) {
                let status = '';
                let timeLeft = '';
                
                if (!data.activated) {
                    status = '⏳ Ожидает';
                } else if (now < data.expires) {
                    status = '✅ Активен';
                    let mins = Math.floor((data.expires - now) / 60000);
                    let secs = Math.floor(((data.expires - now) % 60000) / 1000);
                    timeLeft = ` (осталось ${mins}:${secs.toString().padStart(2, '0')})`;
                } else {
                    status = '❌ Истек';
                }
                
                let item = document.createElement('div');
                item.className = 'password-item';
                item.innerHTML = `
                    <span><strong>${pass}</strong> - ${status}${timeLeft}</span>
                    <div>
                        <button onclick="copyLink('${pass}')">📋</button>
                        <button onclick="deletePassword('${pass}')">✕</button>
                    </div>
                `;
                listDiv.appendChild(item);
            }
        }

        function copyLink(password) {
            let link = window.location.href.replace('admin-jsonbin.html', 'index.html') + '?p=' + password;
            navigator.clipboard.writeText(link);
            alert('Ссылка скопирована!');
        }

        async function deletePassword(password) {
            if (!confirm(`Удалить пароль "${password}"?`)) return;
            
            let passwords = await getPasswords();
            delete passwords[password];
            await savePasswords(passwords);
            loadPasswords();
        }
    </script>
</body>
</html>
