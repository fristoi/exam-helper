<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Управление паролями</title>
    <style>
        /* Все стили как в прошлой версии */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        
        body {
            background: #f8fafc;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        h2 {
            color: #0b3b5c;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        h3 {
            color: #334155;
            margin-bottom: 15px;
        }
        
        .master-password {
            background: #fff3cd;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .master-password input {
            width: 300px;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 30px;
            font-size: 14px;
            margin-right: 10px;
        }
        
        .master-password button {
            background: #28a745;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .create-form {
            background: #f8fafc;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            border: 1px solid #e2e8f0;
        }
        
        .form-row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .form-row input {
            flex: 2;
            min-width: 250px;
            padding: 12px 15px;
            border: 1px solid #e2e8f0;
            border-radius: 30px;
            font-size: 14px;
        }
        
        .form-row select {
            flex: 1;
            min-width: 150px;
            padding: 12px 15px;
            border: 1px solid #e2e8f0;
            border-radius: 30px;
            font-size: 14px;
        }
        
        .create-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        
        th {
            background: #f1f5f9;
            padding: 15px 12px;
            text-align: left;
            font-weight: 600;
        }
        
        td {
            padding: 15px 12px;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .status-active {
            color: #28a745;
            font-weight: 600;
            background: #e8f5e9;
            padding: 4px 12px;
            border-radius: 30px;
            display: inline-block;
        }
        
        .status-expired {
            color: #dc3545;
            font-weight: 600;
            background: #ffebee;
            padding: 4px 12px;
            border-radius: 30px;
            display: inline-block;
        }
        
        .status-waiting {
            color: #fd7e14;
            font-weight: 600;
            background: #fff3e0;
            padding: 4px 12px;
            border-radius: 30px;
            display: inline-block;
        }
        
        .action-btn {
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            margin-right: 4px;
        }
        
        .copy-btn {
            background: #17a2b8;
            color: white;
        }
        
        .extend-btn {
            background: #fd7e14;
            color: white;
        }
        
        .delete-btn {
            background: #dc3545;
            color: white;
        }
        
        .time-left {
            color: #64748b;
            font-size: 12px;
            margin-top: 4px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: #f8fafc;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #e2e8f0;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #0b3b5c;
            margin-bottom: 5px;
        }
        
        .stat-label {
            color: #64748b;
            font-size: 13px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="container">
        <h2>🔐 Управление паролями</h2>
        
        <div class="master-password" id="masterDiv">
            <h3>🔑 Вход</h3>
            <div>
                <input type="password" id="masterPass" placeholder="Мастер-пароль">
                <button onclick="checkMasterPass()">Войти</button>
            </div>
        </div>
        
        <div id="adminContent" style="display: none;">
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="totalCount">0</div>
                    <div class="stat-label">Всего</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="activeCount">0</div>
                    <div class="stat-label">Активных</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="waitingCount">0</div>
                    <div class="stat-label">Ожидают</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="expiredCount">0</div>
                    <div class="stat-label">Истекших</div>
                </div>
            </div>
            
            <div class="create-form">
                <h3>➕ Создать пароль</h3>
                <div class="form-row">
                    <input type="text" id="newPassword" placeholder="Пароль">
                    <select id="newDuration">
                        <option value="20">20 минут</option>
                        <option value="40">40 минут</option>
                        <option value="60">1 час</option>
                    </select>
                    <button class="create-btn" onclick="createPassword()">Создать</button>
                </div>
            </div>
            
            <h3>📋 Список паролей</h3>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Пароль</th>
                            <th>Создан</th>
                            <th>Первый вход</th>
                            <th>Истекает</th>
                            <th>Статус</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody id="passwordsList">
                        <tr><td colspan="6" class="loading">Загрузка...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ
        const MASTER_PASSWORD = 'fr1312';
        let db = null;
        
        // Конфиг Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBf8VZQQv5_XGv86Qa7qW-1JQ9z3R6kLcM",
            authDomain: "exam-helper-3a0f4.firebaseapp.com",
            projectId: "exam-helper-3a0f4",
            storageBucket: "exam-helper-3a0f4.firebasestorage.app",
            messagingSenderId: "381342108027",
            appId: "1:381342108027:web:a9a73e9bdf17f186f9419c"
        };

        // Инициализация при загрузке
        (function() {
            try {
                firebase.initializeApp(firebaseConfig);
                db = firebase.firestore();
                console.log('✅ Firebase инициализирован');
            } catch (e) {
                console.error('❌ Ошибка инициализации Firebase:', e);
            }
        })();


        // ТЕСТ ЗАПИСИ
async function testFirestore() {
    try {
        console.log('🔄 Тест записи в Firestore...');
        
        // Пробуем записать тестовый документ
        await db.collection('test').doc('test').set({
            timestamp: Date.now(),
            message: 'test'
        });
        
        console.log('✅ Запись работает!');
        
        // Пробуем прочитать
        const doc = await db.collection('test').doc('test').get();
        console.log('✅ Чтение работает!', doc.data());
        
    } catch (error) {
        console.error('❌ Ошибка Firestore:', error);
    }
}

// Запускаем тест
testFirestore();
        
        function checkMasterPass() {
            let pass = document.getElementById('masterPass').value;
            if (pass === MASTER_PASSWORD) {
                document.getElementById('masterDiv').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
                loadPasswords();
                setInterval(loadPasswords, 10000);
            } else {
                alert('❌ Неверный пароль');
            }
        }

        async function createPassword() {
            if (!db) {
                alert('❌ База данных не инициализирована');
                return;
            }

            let password = document.getElementById('newPassword').value.trim();
            let duration = parseInt(document.getElementById('newDuration').value);
            
            if (!password) {
                alert('❌ Введите пароль');
                return;
            }

            try {
                const existing = await db.collection('passwords').doc(password).get();
                if (existing.exists) {
                    alert('❌ Такой пароль уже есть');
                    return;
                }

                await db.collection('passwords').doc(password).set({
                    password: password,
                    created: Date.now(),
                    duration: duration,
                    activated: null,
                    expires: null,
                    visits: 0
                });

                document.getElementById('newPassword').value = '';
                await loadPasswords();
                
                let link = window.location.href.replace('admin.html', 'index.html') + '?p=' + encodeURIComponent(password);
                await navigator.clipboard.writeText(link);
                alert(`✅ Пароль "${password}" создан!\nСсылка скопирована`);

            } catch (error) {
                alert('❌ Ошибка: ' + error.message);
            }
        }

        async function loadPasswords() {
            if (!db) return;

            try {
                const snapshot = await db.collection('passwords').get();
                let tbody = document.getElementById('passwordsList');
                let now = Date.now();
                
                let passwords = [];
                snapshot.forEach(doc => passwords.push(doc.data()));
                
                // Статистика
                let total = passwords.length;
                let active = passwords.filter(p => p.activated && now < p.expires).length;
                let waiting = passwords.filter(p => !p.activated).length;
                let expired = passwords.filter(p => p.activated && now > p.expires).length;
                
                document.getElementById('totalCount').textContent = total;
                document.getElementById('activeCount').textContent = active;
                document.getElementById('waitingCount').textContent = waiting;
                document.getElementById('expiredCount').textContent = expired;
                
                if (passwords.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="loading">Нет паролей</td></tr>';
                    return;
                }
                
                tbody.innerHTML = '';
                
                passwords.forEach(pass => {
                    let row = document.createElement('tr');
                    
                    let status = '';
                    let statusClass = '';
                    if (!pass.activated) {
                        status = 'Ожидает';
                        statusClass = 'status-waiting';
                    } else if (now < pass.expires) {
                        status = 'Активен';
                        statusClass = 'status-active';
                    } else {
                        status = 'Истек';
                        statusClass = 'status-expired';
                    }
                    
                    let createdDate = pass.created ? new Date(pass.created).toLocaleString() : '—';
                    let activatedDate = pass.activated ? new Date(pass.activated).toLocaleString() : '—';
                    
                    let expiresHtml = '—';
                    if (pass.expires) {
                        expiresHtml = new Date(pass.expires).toLocaleString();
                        if (now < pass.expires) {
                            let mins = Math.floor((pass.expires - now) / 60000);
                            let secs = Math.floor(((pass.expires - now) % 60000) / 1000);
                            expiresHtml += `<div class="time-left">Осталось: ${mins}:${secs.toString().padStart(2, '0')}</div>`;
                        }
                    }
                    
                    row.innerHTML = `
                        <td><strong>${pass.password}</strong></td>
                        <td>${createdDate}</td>
                        <td>${activatedDate}</td>
                        <td>${expiresHtml}</td>
                        <td><span class="${statusClass}">${status}</span></td>
                        <td>
                            <button class="action-btn copy-btn" onclick="copyLink('${pass.password}')">📋</button>
                            ${pass.activated && now < pass.expires ? 
                                `<button class="action-btn extend-btn" onclick="extendTime('${pass.password}')">+30</button>` : ''}
                            <button class="action-btn delete-btn" onclick="deletePassword('${pass.password}')">✕</button>
                        </td>
                    `;
                    
                    tbody.appendChild(row);
                });
                
            } catch (error) {
                console.error('Ошибка загрузки:', error);
            }
        }

        async function copyLink(password) {
            let link = window.location.href.replace('admin.html', 'index.html') + '?p=' + encodeURIComponent(password);
            await navigator.clipboard.writeText(link);
            alert('✅ Ссылка скопирована');
        }

        async function extendTime(password) {
            if (!confirm('Добавить 30 минут?')) return;
            
            try {
                const doc = await db.collection('passwords').doc(password).get();
                let data = doc.data();
                let newExpires = data.expires + 30 * 60 * 1000;
                
                await db.collection('passwords').doc(password).update({
                    expires: newExpires
                });
                
                await loadPasswords();
                alert('✅ Время продлено');
                
            } catch (error) {
                alert('❌ Ошибка: ' + error.message);
            }
        }

        async function deletePassword(password) {
            if (!confirm(`Удалить пароль "${password}"?`)) return;
            
            try {
                await db.collection('passwords').doc(password).delete();
                await loadPasswords();
                alert('✅ Пароль удален');
            } catch (error) {
                alert('❌ Ошибка: ' + error.message);
            }
        }
    </script>
</body>

</html>
